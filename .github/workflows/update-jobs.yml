name: Update UXR jobs

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC); GitHub may delay scheduled runs
  workflow_dispatch:          # adds a manual "Run workflow" button

permissions:
  contents: write             # lets the Action commit jobs.json back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "jobhive-py[scrapers]" pyarrow

      - name: Fetch jobs
        run: python fetch_jobs.py

      - name: Commit if changed
        run: |
          git config user.name  "uxr-jobs-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          git diff --staged --quiet || git commit -m "Update jobs ($(date -u +%FT%TZ))"
          git push
